<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded border (no fill) -->
  <rect width="60" height="60" x="2" y="2" rx="12" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Open book / codex shape -->
  <path d="M14 18 Q14 14 18 14 L30 14 Q32 14 32 16 L32 46 Q32 44 30 44 L18 44 Q14 44 14 40 Z" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round"/>
  <path d="M50 18 Q50 14 46 14 L34 14 Q32 14 32 16 L32 46 Q32 44 34 44 L46 44 Q50 44 50 40 Z" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round"/>
  <!-- Spine line -->
  <line x1="32" y1="14" x2="32" y2="46" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <!-- Page lines left -->
  <line x1="18" y1="22" x2="28" y2="22" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="18" y1="27" x2="28" y2="27" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="32" x2="28" y2="32" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Check mark on right page -->
  <polyline points="36,28 40,33 48,22" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label: CX -->
  <text x="32" y="57" text-anchor="middle" font-size="10" font-family="system-ui, -apple-system, sans-serif" font-weight="800" letter-spacing="1" fill="#7c3aed">CX</text>
</svg>
