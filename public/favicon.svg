<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#2a2640"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Open book / codex shape -->
  <path d="M14 18 Q14 14 18 14 L30 14 Q32 14 32 16 L32 46 Q32 44 30 44 L18 44 Q14 44 14 40 Z" fill="none" stroke="url(#accent)" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M50 18 Q50 14 46 14 L34 14 Q32 14 32 16 L32 46 Q32 44 34 44 L46 44 Q50 44 50 40 Z" fill="none" stroke="url(#accent)" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Spine line -->
  <line x1="32" y1="14" x2="32" y2="46" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <!-- Page lines left -->
  <line x1="18" y1="22" x2="28" y2="22" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="27" x2="28" y2="27" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="18" y1="32" x2="28" y2="32" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Check mark on right page -->
  <polyline points="36,28 40,33 48,22" fill="none" stroke="#22c55e" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label: CX -->
  <text x="32" y="56" text-anchor="middle" font-size="9" font-family="system-ui, -apple-system, sans-serif" font-weight="700" letter-spacing="1" fill="#a78bfa" opacity="0.8">CX</text>
</svg>
